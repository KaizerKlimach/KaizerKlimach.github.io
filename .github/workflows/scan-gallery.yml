name: Scan gallery folders

on:
  push:
    branches: [main]
    paths:
      - 'assets/gallery/**'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rebuild data/gallery.json from the folders on disk
        run: node scripts/scan-gallery.mjs

      - name: Commit updated gallery.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gallery.json
          git diff --cached --quiet || git commit -m "Rescan gallery folders [skip ci]"
          git push
